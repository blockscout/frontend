name: Deploy review environment

on:
  workflow_dispatch:
    inputs:
      envs_preset:
          description: ENVs preset
          required: false
          default: staging
          type: choice
          options:
            - none
            # presets:start — generated from tools/dev-server/registry.json (run `pnpm presets:sync`)
            - arbitrum
            - arbitrum_sepolia
            - base
            - blackfort_testnet
            - celo
            - celo_sepolia
            - eth
            - eth_sepolia
            - filecoin
            - garnet
            - gnosis
            - immutable
            - mega_eth
            - multichain
            - neon_devnet
            - numine
            - optimism
            - optimism_sepolia
            - polygon
            - rootstock
            - rootstock_testnet
            - scroll_sepolia
            - shibarium
            - stability_testnet
            - staging
            - staging_multichain
            - tac
            - tac_spb
            - zetachain
            - zetachain_testnet
            - zilliqa
            - zksync
            - zora
            # presets:end

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  make_slug:
    name: Make GitHub reference slug
    runs-on: ubuntu-latest
    outputs:
      REF_SLUG: ${{ steps.output.outputs.REF_SLUG }}
    steps:
      -   name: Inject slug/short variables
          uses: rlespinasse/github-slug-action@v4.4.1

      -   name: Set output
          id: output
          run: echo "REF_SLUG=${{ env.GITHUB_REF_NAME_SLUG }}" >> $GITHUB_OUTPUT

  publish_image:
    name: Publish Docker image
    needs: make_slug
    uses: './.github/workflows/publish-image.yml'
    with:
        tags: |
          type=raw,value=review-${{ needs.make_slug.outputs.REF_SLUG }}
        platforms: linux/amd64
    secrets: inherit

  deploy_review:
    name: Deploy frontend
    needs: [ make_slug, publish_image ]
    uses: blockscout/actions/.github/workflows/deploy_helmfile.yaml@main
    with:
      appName: review-${{ needs.make_slug.outputs.REF_SLUG }}
      globalEnv: review
      helmfileDir: deploy
      # Inject the chosen preset as a runtime env (ENVS_PRESET) instead of baking it into the image.
      helmfileParameters: --suppress-diff --state-values-set envsPreset=${{ inputs.envs_preset }}
      kubeConfigSecret: ci/data/dev/kubeconfig/k8s-dev
      vaultRole: ci-dev
    secrets: inherit
    permissions: write-all
