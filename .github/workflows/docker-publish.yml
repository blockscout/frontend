name: Build and push Docker image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set SHORT_SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-8)" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vinuchain/vinuexplorer-frontend:latest
            ghcr.io/vinuchain/vinuexplorer-frontend:${{ env.SHORT_SHA }}
          build-args: |
            GIT_COMMIT_SHA=${{ env.SHORT_SHA }}
            GIT_TAG=${{ github.ref_name }}

      - name: Trigger backend deployment
        if: success()
        continue-on-error: true
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "BACKEND_DEPLOY_TOKEN secret not set — skipping backend trigger"
            exit 0
          fi
          gh workflow run deploy.yml \
            --repo VinuChain/vinuexplorer-backend \
            --ref master
        env:
          GH_TOKEN: ${{ secrets.BACKEND_DEPLOY_TOKEN }}
